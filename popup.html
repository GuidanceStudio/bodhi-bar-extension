<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bodhi Bar — Popup</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    
    <!-- 1. Main Visibility Control -->
    <div class="panel">
      <div class="control-group">
        <label for="visibilityModeSelect">Bar Visibility</label>
        <select id="visibilityModeSelect" disabled>
          <option value="push">Push content (Default)</option>
          <option value="overlay">Overlay content</option>
          <option value="hidden">Hidden</option>
        </select>
      </div>

      <!-- New: Simple Domain Toggle -->
      <div id="domain-setting-row" class="checkbox-row" style="display:none;">
        <input type="checkbox" id="domainToggle">
        <label for="domainToggle">
          Always apply to <span id="currentDomain" class="domain-badge">this site</span>
        </label>
      </div>
    </div>

    <!-- 2. Workspaces Section -->
    <section id="workspaces-section" aria-labelledby="workspaces-heading" class="workspaces-section">
      <div class="workspaces-header">
        <div class="workspaces-title-row">
          <h3 id="workspaces-heading">Workspaces</h3>
          <button id="createWorkspace" class="btn small" title="Save the current window tabs/groups as a workspace">
            Save current
          </button>
        </div>
      </div>

      <ul id="workspacesList" class="workspaces-list" aria-live="polite" aria-relevant="additions removals">
        <!-- Workspace items inserted here by popup.js -->
      </ul>

      <div id="workspaces-note" class="note">
        Snapshots of your current window (pinned tabs + groups).
      </div>
    </section>

    <!-- 3. Advanced Rules (Collapsible) -->
    <details class="advanced-section">
      <summary>Manage Visibility Rules</summary>
      
      <div class="advanced-content">
        <div id="hidden-sites-input-row" class="input-row">
          <input type="text" id="newHiddenSiteInput" placeholder="Pattern (e.g. *.google.com/*)">
          <select id="tz-rule-mode-select">
            <option value="hidden">Hidden</option>
            <option value="overlay">Overlay</option>
            <option value="push">Push</option>
          </select>
          <button id="addHiddenSiteBtn" class="btn small">Add</button>
        </div>

        <ul id="hiddenSitesList" class="workspaces-list">
          <!-- Rules inserted here -->
        </ul>
        <div class="note">Explicit per-tab toggles override these rules.</div>
      </div>
    </details>

  </div>

  <script src="popup.js"></script>
</body>
</html>
