<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bodhi Bar — Popup</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <button id="toggleBar">Loading...</button>

    <section id="presets-section" aria-labelledby="presets-heading" class="presets-section">
      <div class="presets-header">
        <h3 id="presets-heading">Presets</h3>
        <div class="presets-controls">
          <button id="createPreset" class="btn small">Create</button>
        </div>
      </div>

      <ul id="presetsList" class="presets-list" aria-live="polite" aria-relevant="additions removals">
        <!-- Preset items inserted here by popup.js -->
      </ul>

      <div id="presets-note" class="note">
        Saved presets are stored locally. You can delete them or download a preset JSON file. (Applying/loading presets is not available yet.)
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
