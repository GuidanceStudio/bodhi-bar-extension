<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bodhi Bar — Popup</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <button id="toggleBar">Loading...</button>

    <section id="workspaces-section" aria-labelledby="workspaces-heading" class="workspaces-section">
      <div class="workspaces-header">
        <h3 id="workspaces-heading">Workspaces</h3>
        <div class="workspaces-controls">
          <button id="createWorkspace" class="btn small">Create</button>
        </div>
      </div>

      <ul id="workspacesList" class="workspaces-list" aria-live="polite" aria-relevant="additions removals">
        <!-- Workspace items inserted here by popup.js -->
      </ul>

      <div id="workspaces-note" class="note">
        Saved workspaces are stored locally. You can delete them or download a workspace JSON file. (Applying/loading workspaces is not available yet.)
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
