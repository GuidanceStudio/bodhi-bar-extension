<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bodhi Bar — Popup</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="control-group">
      <label for="visibilityModeSelect">Bar Visibility</label>
      <select id="visibilityModeSelect" disabled>
        <option value="push">Push content (Default)</option>
        <option value="overlay">Overlay content</option>
        <option value="hidden">Hidden</option>
      </select>
    </div>

    <!-- Visibility Rules Section (Updated) -->
    <section id="hidden-sites-section" class="workspaces-section" style="margin-top: 16px; border-top: 1px solid #eee; padding-top: 12px;">
      <div class="workspaces-header">
        <div class="workspaces-title-row">
          <h3 id="hidden-sites-heading">Visibility Rules</h3>
          <button id="hideCurrentSiteBtn" class="btn small" title="Add current site pattern as 'hidden'">
            Hide current site
          </button>
        </div>
      </div>

      <div id="hidden-sites-input-row" style="margin-bottom: 8px; display: flex; gap: 4px; align-items: center;">
        <input type="text" id="newHiddenSiteInput" placeholder="Pattern (e.g. docs.google.com/*)" style="flex: 1; padding: 4px; box-sizing: border-box;">
        
        <!-- Mode Selector (Added here for better layout control) -->
        <select id="tz-rule-mode-select" title="Select visibility mode for this rule">
          <option value="hidden">Hidden</option>
          <option value="overlay">Overlay</option>
          <option value="push">Push</option>
        </select>
        
        <button id="addHiddenSiteBtn" class="btn small">Add</button>
      </div>

      <ul id="hiddenSitesList" class="workspaces-list" aria-live="polite">
        <!-- Visibility rule items inserted here by popup.js -->
      </ul>

      <div id="hidden-sites-note" class="note" style="font-size: 11px; color: #666;">
        Use * as a wildcard (e.g. *example.com/*). Explicit per-tab toggles override this list.
      </div>
    </section>

    <!-- Workspaces Section (Moved Down) -->
    <section id="workspaces-section" aria-labelledby="workspaces-heading" class="workspaces-section">
      <div class="workspaces-header">
        <div class="workspaces-title-row">
          <h3 id="workspaces-heading">Workspaces</h3>
          <button id="createWorkspace" class="btn small" title="Save the current window tabs/groups as a workspace">
            Save current
          </button>
        </div>
      </div>

      <ul id="workspacesList" class="workspaces-list" aria-live="polite" aria-relevant="additions removals">
        <!-- Workspace items inserted here by popup.js -->
      </ul>

      <div id="workspaces-note" class="note">
        Workspaces are snapshots of your current window (pinned tabs + tab groups). Save one with "Save current". You can restore, rename, export, or delete them.
      </div>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
