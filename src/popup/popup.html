<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bodhi Bar — Popup</title>
  <link rel="stylesheet" href="../shared/theme.css" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">

    <!-- Per-tab bar visibility -->
    <div class="panel">
      <button id="toggleHiddenBtn" class="vis-toggle" type="button" disabled>Bar visibility</button>
    </div>

    <!-- Workspaces Section -->
    <section id="workspaces-section" aria-labelledby="workspaces-heading" class="workspaces-section">
      <div class="workspaces-header">
        <div class="workspaces-title-row">
          <h3 id="workspaces-heading">Workspaces</h3>
          <button id="createWorkspace" class="btn btn--primary btn--sm" title="Save the current window tabs/groups as a workspace">
            Save current
          </button>
        </div>
      </div>

      <ul id="workspacesList" class="workspaces-list" aria-live="polite" aria-relevant="additions removals">
        <!-- Workspace items inserted here by popup.js -->
      </ul>

      <div id="workspaces-note" class="note">
        Snapshots of your current window (pinned tabs + groups).
      </div>
    </section>

  </div>

  <script src="../constants.js"></script>
  <script src="popup.js"></script>
</body>
</html>
